<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 금고(Gum-Go)</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --gold-primary: #D4AF37;
            --gold-light: #F3E5AB;
            --gold-dark: #996515;
            --bg-color: #f8f9fa;
            --text-dark: #222222;
            --text-gray: #666666;
            --header-border: #eaeaea;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }


        /* Header Navigation */
        .header {
            width: 100%;
            background: white;
            border-bottom: 2px solid var(--gold-primary);
        }

        .header .inner {
            width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 90px;
        }

        .logo {
            font-family: 'Noto Serif KR', serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--gold-dark);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--gold-light), var(--gold-primary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        /* Login Layout */
        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 0;
            background: #fdfbf7;
            /* 약간 따뜻한 톤의 배경 */
        }

        .login-box {
            width: 500px;
            background: white;
            border: 1px solid var(--header-border);
            border-top: 4px solid var(--gold-primary);
            padding: 50px 40px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.05);
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header h2 {
            font-family: 'Noto Serif KR', serif;
            font-size: 28px;
            color: var(--text-dark);
            margin-bottom: 10px;
        }

        .login-header p {
            color: var(--text-gray);
            font-size: 14px;
        }

        /* Login Form */
        .form-group {
            margin-bottom: 20px;
        }

        .form-control {
            width: 100%;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--gold-primary);
            box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--gold-primary);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: var(--gold-dark);
        }

        .login-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .login-options a {
            color: var(--text-gray);
            text-decoration: none;
        }

        .login-options a:hover {
            color: var(--gold-dark);
            text-decoration: underline;
        }

        .custom-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-gray);
            cursor: pointer;
        }

        .custom-checkbox input[type="checkbox"] {
            accent-color: var(--gold-primary);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        /* Footer */
        .footer {
            background: #ffffff;
            padding: 30px 0;
            border-top: 1px solid var(--header-border);
            text-align: center;
        }

        .footer p {
            font-size: 13px;
            color: var(--text-gray);
        }
    </style>
</head>

<body>
    <!-- 헤더 -->
    <header class="header">
        <div class="inner">
            <a href="/" class="logo">
                <div class="logo-icon">金</div>
                금고
            </a>
            <div style="font-family: 'Noto Serif KR', serif; color: var(--gold-dark); font-size: 20px;">
                통합 로그인
            </div>
        </div>
    </header>

    <!-- 로그인 폼 영역 -->
    <div class="login-wrapper">
        <div class="login-box">
            <div class="login-header">
                <h2>로그인</h2>
                <p>금고의 프리미엄 서비스를 이용하시려면 로그인해주세요.</p>
            </div>

            <form action="/login" method="POST">
                <div class="form-group">
                    <input type="text" class="form-control" name="username" placeholder="아이디" required>
                </div>

                <div class="form-group">
                    <input type="password" class="form-control" name="password" placeholder="비밀번호" required>
                </div>

                <div class="form-group">
                    <button type="submit" class="btn-submit">금고 로그인</button>
                </div>

                <div class="login-options">
                    <label class="custom-checkbox">
                        <input type="checkbox" name="remember">
                        아이디 저장
                    </label>
                    <div>
                        <a href="#">아이디 찾기</a> |
                        <a href="#">비밀번호 찾기</a> |
                        <a href="/signup" style="color: var(--gold-dark); font-weight: 500;">회원가입</a>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- 하단 푸터 -->
    <footer class="footer">
        <p>COPYRIGHTS GEUMHO JEWELRY. ALL RIGHTS RESERVED.</p>
    </footer>
</body>

</html>
