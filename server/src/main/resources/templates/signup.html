<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - 금고(Gum-Go)</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --gold-primary: #D4AF37;
            --gold-light: #F3E5AB;
            --gold-dark: #996515;
            --bg-color: #f8f9fa;
            --text-dark: #222222;
            --text-gray: #666666;
            --header-border: #eaeaea;
            --error-color: #d32f2f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Utility Bar */
        .top-utils {
            background-color: #ffffff;
            border-bottom: 1px solid var(--header-border);
            padding: 8px 0;
            font-size: 12px;
            color: var(--text-gray);
        }

        .top-utils .inner {
            width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: flex-end;
            gap: 15px;
        }

        .top-utils a {
            color: var(--text-gray);
            text-decoration: none;
        }

        /* Header Navigation */
        .header {
            width: 100%;
            background: white;
            border-bottom: 2px solid var(--gold-primary);
        }

        .header .inner {
            width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 90px;
        }

        .logo {
            font-family: 'Noto Serif KR', serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--gold-dark);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--gold-light), var(--gold-primary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        /* Signup Layout */
        .signup-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 0;
            background: #fdfbf7;
        }

        .signup-box {
            width: 550px;
            background: white;
            border: 1px solid var(--header-border);
            border-top: 4px solid var(--gold-primary);
            padding: 50px 40px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.05);
        }

        .signup-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .signup-header h2 {
            font-family: 'Noto Serif KR', serif;
            font-size: 28px;
            color: var(--text-dark);
            margin-bottom: 10px;
        }

        .signup-header p {
            color: var(--text-gray);
            font-size: 14px;
        }

        /* Signup Form */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        .form-control {
            width: 100%;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--gold-primary);
            box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.1);
        }

        .error-message {
            color: var(--error-color);
            font-size: 13px;
            margin-top: 5px;
            display: block;
        }

        .global-error {
            background-color: #ffebee;
            color: var(--error-color);
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
            border: 1px solid #ffcdd2;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--gold-primary);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 20px;
        }

        .btn-submit:hover {
            background: var(--gold-dark);
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: var(--text-gray);
        }

        .login-link a {
            color: var(--gold-dark);
            font-weight: 500;
            text-decoration: none;
            margin-left: 5px;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        /* Footer */
        .footer {
            background: #ffffff;
            padding: 30px 0;
            border-top: 1px solid var(--header-border);
            text-align: center;
        }

        .footer p {
            font-size: 13px;
            color: var(--text-gray);
        }
    </style>
</head>

<body>


    <!-- 헤더 -->
    <header class="header">
        <div class="inner">
            <a href="/" class="logo">
                <div class="logo-icon">金</div>
                금고
            </a>
            <div style="font-family: 'Noto Serif KR', serif; color: var(--gold-dark); font-size: 20px;">
                회원가입
            </div>
        </div>
    </header>

    <!-- 회원가입 폼 영역 -->
    <div class="signup-wrapper">
        <div class="signup-box">
            <div class="signup-header">
                <h2>회원가입</h2>
                <p>금고의 프리미엄 멤버십에 가입하시고 특별한 혜택을 누리세요.</p>
            </div>

            <div th:if="${errorMessage}" class="global-error" th:text="${errorMessage}">
                에러 메시지
            </div>

            <form action="/signup" method="POST" th:object="${signUpRequest}">
                <div class="form-group">
                    <label class="form-label" for="username">아이디</label>
                    <input type="text" class="form-control" id="username" th:field="*{username}"
                        placeholder="4~20자 소문자, 숫자" required>
                    <span class="error-message" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">아이디
                        에러</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">비밀번호</label>
                    <input type="password" class="form-control" id="password" th:field="*{password}"
                        placeholder="8자 이상 특수문자 포함" required>
                    <span class="error-message" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">비밀번호
                        에러</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="name">이름 (실명)</label>
                    <input type="text" class="form-control" id="name" th:field="*{name}" placeholder="홍길동" required>
                    <span class="error-message" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">이름 에러</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">이메일</label>
                    <input type="email" class="form-control" id="email" th:field="*{email}"
                        placeholder="example@geumho.com" required>
                    <span class="error-message" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">이메일 에러</span>
                </div>

                <div class="form-group">
                    <button type="submit" class="btn-submit">가입완료</button>
                </div>

                <div class="login-link">
                    이미 계정이 있으신가요? <a href="/login">로그인 하기</a>
                </div>
            </form>
        </div>
    </div>

    <!-- 하단 푸터 -->
    <footer class="footer">
        <p>COPYRIGHTS GEUMHO JEWELRY. ALL RIGHTS RESERVED.</p>
    </footer>
</body>

</html>
